<html>
    <head>
        <title>
            Entry Form
        </title>
    </head>
    <body background="entryformbg.jpg" style="background-repeat: no-repeat; background-size: 100%, auto; background-color: gray; background-blend-mode: multiply; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        <table width="40%" align="center" bordercolor="green">
            <tr>
                <td>
                    <form method="get" action="mainpage.html">
                        <h1 align="center">Entry Form</h1>
                        <h3>Your Name</h3> <input type="text" name="Name">
                        <h3>Teacher or Student</h3>
                        <input type="radio" name="category"> Teacher
                        <input type="radio" name="category"> Student
                        <input type="radio" name="category"> Other
                        <h3>Reason for Entry</h3>
                        <textarea cols="100" rows="15" name="reason">Insert Reason Here</textarea><br><br>
                        <input type="submit">
                        <input type="reset">
                    </form>
                </td>
            </tr>
        </table>
    </body>
</html>
